name: Build
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Build JCC Shell Zygisk module
        run: |
          chmod +x ./gradlew
          grep -n GamePackageName module/src/main/cpp/game.h
          cat module.gradle
          ./gradlew :module:assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: jcc-shell-zygisk
          path: out/magisk_module_release/
